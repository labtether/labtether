name: CI

on:
  pull_request:
  push:
    branches: ["main", "master", "codex/**"]

jobs:
  go-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Check formatting
        run: |
          UNFORMATTED=$(gofmt -l $(find . -name '*.go' -not -path './vendor/*'))
          if [ -n "$UNFORMATTED" ]; then
            echo "Go files need formatting:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./...

  perf-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgres://labtether:labtether@localhost:5432/labtether?sslmode=disable
      LABTETHER_OWNER_TOKEN: dev-owner-token-change-me
      LABTETHER_API_TOKEN: dev-owner-token-change-me
      LABTETHER_ADMIN_USERNAME: admin
      LABTETHER_ADMIN_PASSWORD: password
      LABTETHER_ENCRYPTION_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      LABTETHER_TLS_MODE: disabled
      DEV_MODE: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Backend hotspot perf gate
        continue-on-error: true
        run: make perf-gate

      - name: Run reduced apples harness + thresholds
        continue-on-error: true
        run: |
          set -euo pipefail
          ARTIFACT_ROOT="/tmp/labtether-perf-artifacts"
          RUN_ROOT="${ARTIFACT_ROOT}/runs"
          PG_CONTAINER="labtether-perf-pg"
          BACKEND_PID=""
          mkdir -p "${ARTIFACT_ROOT}" "${RUN_ROOT}"

          cleanup() {
            if [[ -n "${BACKEND_PID}" ]] && kill -0 "${BACKEND_PID}" >/dev/null 2>&1; then
              kill "${BACKEND_PID}" || true
              wait "${BACKEND_PID}" || true
            fi
            docker rm -f "${PG_CONTAINER}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker rm -f "${PG_CONTAINER}" >/dev/null 2>&1 || true
          docker run -d --name "${PG_CONTAINER}" \
            -e POSTGRES_USER=labtether \
            -e POSTGRES_PASSWORD=labtether \
            -e POSTGRES_DB=labtether \
            -p 5432:5432 \
            postgres:16 \
            -c shared_preload_libraries=pg_stat_statements \
            -c pg_stat_statements.track=all >/dev/null

          for i in $(seq 1 60); do
            if docker exec "${PG_CONTAINER}" pg_isready -U labtether -d labtether >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          docker exec "${PG_CONTAINER}" pg_isready -U labtether -d labtether >/dev/null
          docker exec "${PG_CONTAINER}" psql -U labtether -d labtether -c "CREATE EXTENSION IF NOT EXISTS pg_stat_statements;" >/dev/null

          go build -o build/labtether ./cmd/labtether
          ./build/labtether > "${ARTIFACT_ROOT}/backend.log" 2>&1 &
          BACKEND_PID=$!
          echo "${BACKEND_PID}" > "${ARTIFACT_ROOT}/backend.pid"

          for i in $(seq 1 60); do
            if curl -fsS --max-time 2 "http://localhost:8080/healthz" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          curl -fsS --max-time 2 "http://localhost:8080/healthz" >/dev/null

          # Seed at least one asset so aggregate telemetry paths execute and
          # pg_stat_statements captures the lateral SnapshotMany query shape.
          curl -fsS -X POST "http://localhost:8080/assets/heartbeat" \
            -H "Authorization: Bearer ${LABTETHER_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"asset_id":"perf-ci-asset-01","type":"host","name":"Perf CI Asset 01","source":"perf-ci","status":"online","platform":"linux","metadata":{"cpu_percent":"12.5","memory_percent":"44.1"}}' >/dev/null

          ./scripts/perf/backend-hotspot-apples.sh \
            --label ci-hotspot \
            --api-base "http://localhost:8080" \
            --token "${LABTETHER_API_TOKEN}" \
            --aggregate-calls 240 \
            --live-calls 480 \
            --concurrency 16 \
            --cpu-seconds 5 \
            --skip-pprof \
            --output-root "${RUN_ROOT}" \
            --no-auto-compare

          RUN_DIR="$(ls -1dt "${RUN_ROOT}"/*-ci-hotspot | head -1)"
          echo "RUN_DIR=${RUN_DIR}" >> "${GITHUB_ENV}"

          ./scripts/perf/backend-hotspot-thresholds.sh \
            --summary "${RUN_DIR}/summary.json" \
            --write-report "${RUN_DIR}/threshold-report.json"

          ./scripts/perf/backend-hotspot-explain.sh \
            --scenario projected-site \
            --dsn "${DATABASE_URL}" \
            --output "${RUN_DIR}/explain-projected-site.json"

          ./scripts/perf/backend-hotspot-explain.sh \
            --scenario sources-windowed \
            --dsn "${DATABASE_URL}" \
            --output "${RUN_DIR}/explain-sources-windowed.json"

      - name: Upload backend perf artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-hotspot-perf-artifacts
          path: /tmp/labtether-perf-artifacts
          if-no-files-found: warn

  web-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web/console
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: web/console/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  docs-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Docs quality checks
        run: make check-docs

  web-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: web/console
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: web/console/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        run: npx playwright test --ignore-pattern='**/visual-regression*'

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-e2e-playwright
          path: |
            web/console/playwright-report
            web/console/test-results
          if-no-files-found: warn

  web-e2e-https:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: web/console
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: web/console/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E over self-signed HTTPS
        run: PLAYWRIGHT_SELF_SIGNED_HTTPS=1 npx playwright test --ignore-pattern='**/visual-regression*'

      - name: Upload HTTPS E2E Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-e2e-https-playwright
          path: |
            web/console/playwright-report
            web/console/test-results
          if-no-files-found: warn

  web-visual-https:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: web/console
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: web/console/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run visual regression over self-signed HTTPS
        continue-on-error: true
        run: npm run test:visual:https

      - name: Upload HTTPS visual Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-visual-https-playwright
          path: |
            web/console/playwright-report
            web/console/test-results
          if-no-files-found: warn

  stack-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare environment
        run: |
          cp .env.example .env
          sed -i 's/REPLACE_WITH_STRONG_POSTGRES_PASSWORD/ci-smoke-pw/g' .env
          sed -i 's/REPLACE_WITH_LONG_RANDOM_OWNER_TOKEN/ci-owner-token/g' .env
          sed -i 's/REPLACE_WITH_LONG_RANDOM_API_TOKEN/ci-owner-token/g' .env
          sed -i 's|REPLACE_WITH_BASE64_32_BYTE_KEY|MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=|g' .env
          sed -i 's/REPLACE_WITH_STRONG_ADMIN_PASSWORD/ci-admin-pw/g' .env

      - name: Smoke test
        run: ./scripts/smoke-test.sh --keep

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs --no-color 2>&1 | tail -100 || true

      - name: Integration test
        run: make integration-test

      - name: Tear down
        if: always()
        run: docker compose down || true
