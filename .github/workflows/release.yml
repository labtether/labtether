name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26"

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate agent manifest and download binaries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          ./scripts/release/generate-agent-manifest.sh "${RELEASE_VERSION}" ./agent-dist

      - name: Build and push all-in-one image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: build/Dockerfile
          push: true
          tags: |
            ghcr.io/labtether/labtether:${{ github.ref_name }}
            ghcr.io/labtether/labtether:latest
          platforms: linux/amd64,linux/arm64
          build-args: |
            APP_VERSION=${{ github.ref_name }}
          provenance: mode=max
          sbom: true

      - name: Verify pushed deploy image runtime mounts
        env:
          LABTETHER_IMAGE: ghcr.io/labtether/labtether@${{ steps.build.outputs.digest }}
        run: |
          docker pull "${LABTETHER_IMAGE}"
          ./scripts/ci/test-deploy-image-runtime.sh "${LABTETHER_IMAGE}"

      - name: Attest pushed image provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ghcr.io/labtether/labtether
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Render deploy release artifacts
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          ./scripts/release/render-deploy-artifacts.sh \
            --version "${GITHUB_REF_NAME}" \
            --repository "${GITHUB_REPOSITORY}" \
            --image-digest "${IMAGE_DIGEST}" \
            --output-dir "${RUNNER_TEMP}/release-artifacts"

      - name: Validate deploy release artifacts
        run: |
          cd "${RUNNER_TEMP}/release-artifacts"
          docker compose -f docker-compose.deploy.yml config --quiet
          sha256sum --check SHA256SUMS
          ! grep -R --fixed-strings 'exec /service' docker-compose.deploy.yml

      - name: Attest deploy release artifacts
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: |
            ${{ runner.temp }}/release-artifacts/docker-compose.deploy.yml
            ${{ runner.temp }}/release-artifacts/.env.deploy.example
            ${{ runner.temp }}/release-artifacts/deploy-manifest.json
            ${{ runner.temp }}/release-artifacts/SHA256SUMS

      - name: Upload release artifacts to GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          files: |
            ${{ runner.temp }}/release-artifacts/docker-compose.deploy.yml
            ${{ runner.temp }}/release-artifacts/.env.deploy.example
            ${{ runner.temp }}/release-artifacts/deploy-manifest.json
            ${{ runner.temp }}/release-artifacts/SHA256SUMS
