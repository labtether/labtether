# docker-compose.demo.yml — demo mode overlay
# Usage: ./scripts/demo-up.sh
#    or: docker compose --env-file .env.demo -f deploy/compose/docker-compose.deploy.yml -f docker-compose.demo.yml up -d
#
# Designed for deployment behind Cloudflare proxy:
# - Console exposed on port 80 (Cloudflare terminates TLS)
# - Hub TLS disabled (internal only, not exposed)
# - Hub HTTP bound to localhost only (console proxies API calls)
# - No admin user — demo mode auto-provisions a read-only viewer session
# - Demo seed runs automatically after hub is healthy
services:
  labtether:
    environment:
      - LABTETHER_DEMO_MODE=true
      - LABTETHER_DEMO_CONFIRM=yes-this-is-a-demo-instance
      - LABTETHER_TLS_MODE=disabled
      # Unset admin credentials so only the demo viewer user is created.
      # The demo bootstrap refuses to run if non-demo users exist.
      - LABTETHER_ADMIN_USERNAME=
      - LABTETHER_ADMIN_PASSWORD=
    ports:
      - "127.0.0.1:8080:8080"

  web-console:
    environment:
      - NEXT_PUBLIC_DEMO_MODE=true
      - LABTETHER_DEMO_MODE=true
    ports:
      - "0.0.0.0:80:3000"

  demo-seed:
    image: ${POSTGRES_IMAGE:-postgres:18-alpine}
    restart: "no"
    depends_on:
      labtether:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -ec
      - |
        export PGPASSWORD="$$(cat /bootstrap/postgres/password)"
        echo "Waiting 5s for migrations to complete..."
        sleep 5
        psql -h postgres -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -f /seed/demo-seed.sql
        echo "Demo seed complete."
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-labtether}
      POSTGRES_USER: ${POSTGRES_USER:-labtether}
    volumes:
      - labtether-bootstrap:/bootstrap:ro
      - ../../scripts/demo-seed.sql:/seed/demo-seed.sql:ro
