## Demo deployment for App Store review.
## Extends docker-compose.deploy.yml with demo mode, seed job, and relaxed bind addresses.
##
## Usage:
##   ./scripts/demo-up.sh
##   or: docker compose --env-file .env.demo -f deploy/compose/docker-compose.deploy.yml -f deploy/compose/docker-compose.demo.yml up -d
##
## The demo-seed service runs once after the hub is healthy, inserting sample
## assets, alerts, incidents, logs, and the apple-review viewer account.
## The demo bootstrap auto-creates a read-only viewer user and auto-provisions
## sessions for anonymous visitors — no login required.

services:
  labtether:
    environment:
      LABTETHER_DEMO_MODE: "true"
      LABTETHER_DEMO_CONFIRM: "yes-this-is-a-demo-instance"
      LABTETHER_TLS_MODE: "off"
      # Unset admin credentials so only the demo viewer user is created.
      LABTETHER_ADMIN_USERNAME: ""
      LABTETHER_ADMIN_PASSWORD: ""
    ports:
      - "0.0.0.0:8080:8080"

  web-console:
    environment:
      NEXT_PUBLIC_DEMO_MODE: "true"
      LABTETHER_DEMO_MODE: "true"
    ports:
      - "0.0.0.0:3000:3000"

  demo-seed:
    image: ${POSTGRES_IMAGE:?set POSTGRES_IMAGE in .env.deploy}
    restart: "no"
    depends_on:
      labtether:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -ec
      - |
        export PGPASSWORD="$$(cat /bootstrap/postgres/password)"
        echo "Waiting 5s for migrations to complete..."
        sleep 5
        psql -h postgres -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -f /seed/demo-seed.sql
        echo "Demo seed complete."
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-labtether}
      POSTGRES_USER: ${POSTGRES_USER:-labtether}
    volumes:
      - labtether-bootstrap:/bootstrap:ro
      - ./scripts/demo-seed.sql:/seed/demo-seed.sql:ro
