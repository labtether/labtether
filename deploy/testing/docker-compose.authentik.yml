# Ephemeral Authentik stack for testing OIDC integration.
# Usage: docker compose -f deploy/testing/docker-compose.authentik.yml up -d
# Teardown: docker compose -f deploy/testing/docker-compose.authentik.yml down -v
#
# Authentik UI: http://localhost:9000
# Admin login: akadmin / testing-only-password

services:
  authentik-postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: authentik
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: authentik-test-db
    volumes:
      - authentik-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik -d authentik"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  authentik-redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  authentik-server:
    image: ghcr.io/goauthentik/server:2024.12
    command: server
    environment:
      AUTHENTIK_SECRET_KEY: testing-only-secret-key-not-for-production
      AUTHENTIK_BOOTSTRAP_PASSWORD: testing-only-password
      AUTHENTIK_BOOTSTRAP_EMAIL: admin@localhost
      AUTHENTIK_BOOTSTRAP_TOKEN: labtether-test-bootstrap-token
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: authentik-test-db
    ports:
      - "127.0.0.1:9000:9000"
    depends_on:
      authentik-postgres:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy

  authentik-worker:
    image: ghcr.io/goauthentik/server:2024.12
    command: worker
    environment:
      AUTHENTIK_SECRET_KEY: testing-only-secret-key-not-for-production
      AUTHENTIK_BOOTSTRAP_TOKEN: labtether-test-bootstrap-token
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: authentik-test-db
    depends_on:
      authentik-postgres:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy

volumes:
  authentik-pg:
